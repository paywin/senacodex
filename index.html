<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SENACODEX - Sistema de Gerenciamento de Projetos Integradores</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F4F7F6; color: #1a2c3e; line-height: 1.5; }
        .app-container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #0A3D91; color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; z-index: 10; }
        .logo-area { background: white; padding: 20px 24px; margin-bottom: 32px; width: 100%; }
        .logo-area h2 { font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px; }
        .logo-area h2 .sena { color: #F37021; }
        .logo-area h2 .codex { color: #0A3D91; }
        .logo-area p { font-size: 0.7rem; color: #6c757d; margin-top: 6px; }
        .nav-menu { flex: 1; padding: 0; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 24px; cursor: pointer; transition: 0.2s; color: rgba(255,255,255,0.85); font-weight: 500; border-left: 4px solid transparent; }
        .nav-item i { width: 24px; font-size: 1.2rem; }
        .nav-item.active { background: rgba(255,255,255,0.12); color: white; border-left: 4px solid #F37021; }
        .nav-item:hover:not(.active) { background: rgba(255,255,255,0.08); }
        .sidebar-footer { padding: 20px 0 24px; border-top: 1px solid rgba(255,255,255,0.2); margin-top: auto; }
        
        /* Conteúdo principal */
        .main-content { margin-left: 260px; flex: 1; background: #F4F7F6; min-height: 100vh; }
        .top-header { background: white; width: 100%; padding: 16px 32px; border-bottom: 1px solid #E0E0E0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 5; }
        .page-title h1 { font-size: 1.5rem; font-weight: 600; color: #1a2c3e; }
        .page-title p { font-size: 0.8rem; color: #6c757d; margin-top: 4px; }
        .header-actions { display: flex; align-items: center; gap: 24px; }
        .notification-bell { position: relative; font-size: 1.3rem; color: #5a6e7c; cursor: pointer; }
        .notification-badge { position: absolute; top: -6px; right: -8px; background: #e74c3c; color: white; font-size: 0.65rem; font-weight: bold; padding: 2px 6px; border-radius: 20px; }
        .user-profile { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar { width: 42px; height: 42px; background: #0A3D91; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .user-info { font-weight: 500; line-height: 1.3; }
        .user-name { font-size: 0.9rem; color: #1a2c3e; }
        .user-role { font-size: 0.7rem; color: #6c757d; }
        
        .page-content { padding: 28px 32px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 24px; margin-bottom: 32px; }
        .stat-card { background: white; border: 1px solid #E0E0E0; border-radius: 12px; display: flex; overflow: hidden; }
        .stat-icon { width: 70px; display: flex; align-items: center; justify-content: center; }
        .stat-card:nth-child(1) .stat-icon { background: rgba(10,61,145,0.1); }
        .stat-card:nth-child(1) .stat-icon i { color: #0A3D91; }
        .stat-card:nth-child(2) .stat-icon { background: rgba(231,76,60,0.1); }
        .stat-card:nth-child(2) .stat-icon i { color: #e74c3c; }
        .stat-card:nth-child(3) .stat-icon { background: rgba(243,112,33,0.1); }
        .stat-card:nth-child(3) .stat-icon i { color: #F37021; }
        .stat-card:nth-child(4) .stat-icon { background: rgba(52,152,219,0.1); }
        .stat-card:nth-child(4) .stat-icon i { color: #3498db; }
        .stat-icon i { font-size: 2rem; }
        .stat-info { padding: 16px; flex: 1; }
        .stat-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: #6c757d; font-weight: 500; }
        .stat-number { font-size: 2rem; font-weight: 800; margin: 6px 0 4px; }
        .stat-trend { font-size: 0.7rem; display: flex; align-items: center; gap: 4px; }
        .trend-up { color: #e67e22; }
        .trend-down { color: #27ae60; }
        
        .section-card { background: white; border-radius: 16px; padding: 20px 24px; margin-bottom: 32px; border: 1px solid #E0E0E0; }
        .section-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .activities-list { display: flex; flex-direction: column; gap: 18px; }
        .activity-item { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding-bottom: 12px; }
        .activity-left { display: flex; align-items: center; gap: 14px; }
        .activity-icon { width: 32px; text-align: center; color: #F37021; }
        .activity-text { font-size: 0.9rem; }
        .activity-time { font-size: 0.7rem; color: #95a5a6; }
        
        .status-chart-row { display: flex; gap: 40px; flex-wrap: wrap; align-items: center; }
        .chart-container { width: 220px; }
        .status-legend { display: flex; flex-direction: column; gap: 12px; }
        .legend-item { display: flex; align-items: center; gap: 12px; }
        .legend-color { width: 14px; height: 14px; border-radius: 4px; }
        
        .projects-table-wrapper { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { text-align: left; padding: 14px 8px; border-bottom: 1px solid #E0E0E0; font-size: 0.85rem; }
        .data-table th { font-weight: 600; color: #0A3D91; }
        .badge { background: #eef2fa; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 500; }
        .btn-sm { background: #F37021; border: none; padding: 6px 14px; border-radius: 20px; color: white; font-size: 0.7rem; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .btn-sm:hover { background: #d85e14; }
        .btn-primary { background: #F37021; border: none; padding: 8px 20px; border-radius: 30px; color: white; font-weight: 600; cursor: pointer; }
        .btn-outline-orange { background: transparent; border: 1px solid #F37021; color: #F37021; padding: 6px 16px; border-radius: 30px; cursor: pointer; }
        .progress-bar-bg { background: #e9ecef; border-radius: 20px; height: 6px; width: 100px; overflow: hidden; }
        .progress-fill { background: #F37021; height: 6px; border-radius: 20px; }
        .risk-high { color: #e74c3c; font-weight: bold; }
        .risk-medium { color: #F37021; }
        .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .form-group { margin-bottom: 18px; }
        label { font-weight: 500; display: block; margin-bottom: 8px; }
        input, textarea, select { width: 100%; padding: 10px 14px; border: 1px solid #ccc; border-radius: 12px; font-family: inherit; }
        .flex-btns { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }
        .modal { display: none; position: fixed; top:0;left:0; width:100%;height:100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; max-width: 450px; width: 90%; border-radius: 24px; padding: 28px; }
        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .two-columns { grid-template-columns: 1fr; }
            .sidebar { width: 80px; }
            .sidebar .logo-area h2 { font-size: 1rem; }
            .sidebar .logo-area p, .sidebar .nav-item span { display: none; }
            .main-content { margin-left: 80px; }
            .nav-item { justify-content: center; padding: 12px 0; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="logo-area">
            <h2><span class="sena">SENA</span><span class="codex">CODEX</span></h2>
            <p>Gestão de PI</p>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" data-page="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div>
            <div class="nav-item" data-page="projetos"><i class="fas fa-folder-open"></i><span>Meus Projetos</span></div>
            <div class="nav-item" data-page="submeter"><i class="fas fa-upload"></i><span>Submeter Versão</span></div>
            <div class="nav-item" data-page="analisadores"><i class="fas fa-chalkboard-teacher"></i><span>Avaliações</span></div>
            <div class="nav-item" data-page="relatorios"><i class="fas fa-chart-line"></i><span>Relatórios</span></div>
            <div class="nav-item" data-page="risco"><i class="fas fa-exclamation-triangle"></i><span>Painel de Risco</span></div>
        </div>
        <div class="sidebar-footer">
            <div class="nav-item" id="configBtn"><i class="fas fa-cog"></i><span>Configurações</span></div>
            <div class="nav-item" id="ajudaBtn"><i class="fas fa-question-circle"></i><span>Ajuda</span></div>
        </div>
    </div>
    <div class="main-content" id="mainContent"></div>
</div>

<script>
    // Dados dos projetos
    const projetosData = [
        { id: 1, nome: "App de Delivery", turma: "T3", orientador: "Prof. Silva", status: "Em Andamento", progresso: 60, risco: "Alto", ultimaAtualizacao: "16/09/2025", alunos: "João Silva, Maria Santos" },
        { id: 2, nome: "Gestão de projetos", turma: "T1", orientador: "Prof. Cliente", status: "Em Revisão", progresso: 80, risco: "Médio", ultimaAtualizacao: "16/09/2025" },
        { id: 3, nome: "Smart Campus", turma: "T3", orientador: "Prof. Santos", status: "Em Andamento", progresso: 45, risco: "Alto", ultimaAtualizacao: "10/03/2025" },
        { id: 4, nome: "Health Track", turma: "T1", orientador: "Prof. Lima", status: "Em Revisão", progresso: 70, risco: "Médio", ultimaAtualizacao: "16/09/2025" },
        { id: 5, nome: "Green Energy", turma: "T2", orientador: "Prof. Fernandes", status: "Em Andamento", progresso: 30, risco: "Baixo", ultimaAtualizacao: "06/03/2025" },
        { id: 6, nome: "CodeConcert", turma: "T2", orientador: "Prof. Sítio", status: "Em Andamento", progresso: 20, risco: "Baixo", ultimaAtualizacao: "16/09/2025" },
        { id: 7, nome: "Food Waste", turma: "T4", orientador: "Prof. Sítio", status: "Em Andamento", progresso: 10, risco: "Médio", ultimaAtualizacao: "16/09/2025" },
        { id: 8, nome: "Study Planner", turma: "T5", orientador: "Prof. Almeida", status: "Concluído", progresso: 100, risco: "Baixo", ultimaAtualizacao: "16/09/2025" }
    ];
    const versoesApp = [
        { versao: "1.0", data: "18/03/2025 - 14:32", nota: null },
        { versao: "2.0", data: "02/03/2025 - 10:15", nota: 8.5 },
        { versao: "2.3", data: "10/04/2025 - 09:20", nota: null },
        { versao: "2.4", data: "10/05/2025 - 11:00", nota: null }
    ];

    let currentChart = null;

    function showModal(msg) {
        let modal = document.getElementById('globalModal');
        if(!modal) {
            modal = document.createElement('div');
            modal.id = 'globalModal';
            modal.className = 'modal';
            document.body.appendChild(modal);
        }
        modal.innerHTML = `<div class="modal-content"><p style="white-space:pre-line">${msg}</p><div class="flex-btns"><button class="btn-primary" id="modalOkBtn">OK</button></div></div>`;
        modal.style.display = 'flex';
        document.getElementById('modalOkBtn').onclick = () => modal.style.display = 'none';
    }

    function renderHeader(title, subtitle = "") {
        return `
            <div class="top-header">
                <div class="page-title"><h1>${title}</h1>${subtitle ? `<p>${subtitle}</p>` : ''}</div>
                <div class="header-actions">
                    <div class="notification-bell" id="bellIcon"><i class="far fa-bell"></i><span class="notification-badge">3</span></div>
                    <div class="user-profile" id="userProfile"><div class="avatar">AP</div><div class="user-info"><div class="user-name">Ana Paula</div><div class="user-role">Coordenação</div></div></div>
                </div>
            </div>
        `;
    }

    function renderDashboard() {
        const total = projetosData.length;
        const emRisco = projetosData.filter(p => p.risco === "Alto").length;
        const pendentes = projetosData.filter(p => p.status !== "Concluído").length;
        const atividades = [
            { icon: "fas fa-code-branch", text: "Projeto CooGrant foi atualizado para a versão 2.3", time: "Há 7 horas" },
            { icon: "fas fa-comment", text: "Você recebeu um novo feedback no projeto Smart Campus", time: "Há 3 horas" },
            { icon: "fas fa-bell", text: "Alerta de risco alto no projeto App de Delivery", time: "Há 5 horas" },
            { icon: "fas fa-calendar", text: "Prazo de entrega de etapa 3 se aproxima (3 projetos)", time: "Em 1 dia" }
        ];
        return `
            ${renderHeader("Dashboard", "Visão geral dos Projetos Integradores")}
            <div class="page-content">
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-folder-open"></i></div><div class="stat-info"><div class="stat-title">Total de Projetos</div><div class="stat-number">${total}</div><div class="stat-trend"><i class="fas fa-arrow-up trend-up"></i><span>12% vs mês anterior</span></div></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="stat-info"><div class="stat-title">Em Risco</div><div class="stat-number">${emRisco}</div><div class="stat-trend"><i class="fas fa-arrow-up trend-up"></i><span>28% vs mês anterior</span></div></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-info"><div class="stat-title">Entregas Pendentes</div><div class="stat-number">${pendentes}</div><div class="stat-trend"><i class="fas fa-arrow-up trend-up"></i><span>15% vs mês anterior</span></div></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-star"></i></div><div class="stat-info"><div class="stat-title">Avaliações Pendentes</div><div class="stat-number">45</div><div class="stat-trend"><i class="fas fa-arrow-down trend-down"></i><span>5% vs mês anterior</span></div></div></div>
                </div>
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-list-ul"></i> Atividades Recentes</div>
                    <div class="activities-list">${atividades.map(a => `<div class="activity-item"><div class="activity-left"><div class="activity-icon"><i class="${a.icon}"></i></div><div class="activity-text">${a.text}</div></div><div class="activity-time">${a.time}</div></div>`).join('')}</div>
                </div>
                <div class="section-card">
                    <div class="section-title">Projetos por Status</div>
                    <div class="status-chart-row">
                        <div class="chart-container"><canvas id="statusDoughnut" width="200" height="200"></canvas></div>
                        <div class="status-legend">
                            <div class="legend-item"><div class="legend-color" style="background:#0A3D91"></div><span>Em Andamento (${projetosData.filter(p=>p.status==="Em Andamento").length})</span></div>
                            <div class="legend-item"><div class="legend-color" style="background:#F37021"></div><span>Em Revisão (${projetosData.filter(p=>p.status==="Em Revisão").length})</span></div>
                            <div class="legend-item"><div class="legend-color" style="background:#e74c3c"></div><span>Ativados (2)</span></div>
                            <div class="legend-item"><div class="legend-color" style="background:#2ecc71"></div><span>Concluídos (${projetosData.filter(p=>p.status==="Concluído").length})</span></div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    function renderProjetos() {
        return `
            ${renderHeader("Menu Projetos", "Gerencie e acompanhe todos os projetos integradores.")}
            <div class="page-content">
                <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
                    <div class="stat-card"><div class="stat-info"><div class="stat-title">Total</div><div class="stat-number">${projetosData.length}</div></div></div>
                    <div class="stat-card"><div class="stat-info"><div class="stat-title">Concluídos</div><div class="stat-number">${projetosData.filter(p=>p.status==="Concluído").length}</div></div></div>
                    <div class="stat-card"><div class="stat-info"><div class="stat-title">Em Andamento</div><div class="stat-number">${projetosData.filter(p=>p.status==="Em Andamento").length}</div></div></div>
                    <div class="stat-card"><div class="stat-info"><div class="stat-title">Em Risco</div><div class="stat-number">${projetosData.filter(p=>p.risco==="Alto").length}</div></div></div>
                </div>
                <div class="section-card projects-table-wrapper">
                    <table class="data-table"><thead><tr><th>Projeto</th><th>Status</th><th>Progresso</th><th>Última Atualização</th><th>Ações</th></tr></thead>
                    <tbody>${projetosData.map(p => `<tr><td><strong>${p.nome}</strong><br><span class="badge">${p.turma}</span></td><td>${p.status}</td><td><div class="progress-bar-bg"><div class="progress-fill" style="width:${p.progresso}%"></div></div> ${p.progresso}%</td><td>${p.ultimaAtualizacao}</td><td><button class="btn-sm ver-detalhes" data-id="${p.id}">Ver Detalhes</button></td></tr>`).join('')}</tbody></table>
                </div>
            </div>
        `;
    }

    function renderSubmeter() {
        return `
            ${renderHeader("Submeter Versão", "App de Delivery")}
            <div class="page-content">
                <div class="two-columns">
                    <div class="section-card"><h3>Nova Submissão</h3>
                        <div class="form-group"><label>Título do Projeto</label><input value="App de Delivery" disabled></div>
                        <div class="form-group"><label>Descrição</label><textarea rows="2">Aplicativo voltado para delivery de alimentos com foco em restaurantes locais.</textarea></div>
                        <div class="form-group"><label>Arquivo (PDF, DOCX, ZIP max 5MB)</label><input type="file"></div>
                        <div class="form-group"><label>Versão</label><input id="versaoNum" value="2.5"></div>
                        <div class="flex-btns"><button class="btn-outline-orange" id="cancelarSubmissao">Cancelar</button><button class="btn-primary" id="enviarVersaoBtn">Enviar Versão</button></div>
                    </div>
                    <div class="section-card"><h3>Progresso</h3><div class="progress-bar-bg"><div class="progress-fill" style="width:60%"></div></div><p>3 de 5 etapas - 60%</p><ul><li>✓ Definição de Tema</li><li>✓ Pesquisa Bibliográfica</li><li>✓ Metodologia</li><li>⏳ Desenvolvimento</li><li>⏳ Apresentação Final</li></ul></div>
                    <div class="section-card"><h3>Histórico de Versões</h3>${versoesApp.map(v=>`<div><strong>${v.versao}</strong> - ${v.data} ${v.nota ? `Nota: ${v.nota}` : ''}</div>`).join('')}</div>
                    <div class="section-card"><h3>Resumo</h3><p>Projeto: App de Delivery<br>Orientador: Prof. Silva<br>Início: 15/02/2025<br>Previsão: 30/04/2025</p></div>
                </div>
            </div>
        `;
    }

    function renderAnalisadores() {
        return `
            ${renderHeader("Avaliação - App de Delivery", "Professor: Avalie e forneça feedback")}
            <div class="page-content">
                <div class="section-card">
                    <h3>Matriz de Avaliação</h3>
                    <table class="data-table"><thead><tr><th>Critério</th><th>Nota (0-10)</th><th>Observações</th></tr></thead>
                    <tbody>
                        <tr><td>Metodologia</td><td><input type="number" id="notaMetodologia" value="8.0" step="0.5" style="width:80px"></td><td><input type="text" value="Metodologia bem definida"></td></tr>
                        <tr><td>Resultados</td><td><input type="number" id="notaResultados" value="7.5" step="0.5"></td><td><input type="text" value="Resultados coerentes"></td></tr>
                        <tr><td>Originalidade</td><td><input type="number" id="notaOriginalidade" value="8.5" step="0.5"></td><td><input type="text" value="Solução inovadora"></td></tr>
                        <tr><td>Formatação</td><td><input type="number" id="notaFormatacao" value="6.5" step="0.5"></td><td><input type="text" value="Ajustar normas"></td></tr>
                    </tbody></table>
                    <div style="margin-top:20px"><label>Feedback para Alunos:</label><textarea id="feedbackTexto" rows="3">Parabéns pelo trabalho! Fiquem atentos aos pontos de melhorias.</textarea></div>
                    <div class="flex-btns"><button class="btn-primary" id="salvarAvaliacaoBtn">Salvar Avaliação & Notificar</button><button class="btn-outline-orange" id="enviarEmailBtn">Enviar por E-mail</button></div>
                </div>
            </div>
        `;
    }

    function renderRelatorios() {
        return `
            ${renderHeader("Relatórios", "Acompanhe o desempenho dos projetos")}
            <div class="page-content">
                <div class="section-card">
                    <h3>Evolução de Projetos (últimos 5 meses)</h3>
                    <canvas id="evolucaoChart" style="max-height:300px; width:100%"></canvas>
                </div>
                <div class="section-card">
                    <h3>Projetos por Nível de Risco</h3>
                    <ul><li>Alto: ${projetosData.filter(p=>p.risco==="Alto").length}</li><li>Médio: ${projetosData.filter(p=>p.risco==="Médio").length}</li><li>Baixo: ${projetosData.filter(p=>p.risco==="Baixo").length}</li></ul>
                </div>
            </div>
        `;
    }

    function renderRisco() {
        const riscoProjetos = projetosData.filter(p=>p.risco==="Alto"||p.risco==="Médio");
        return `
            ${renderHeader("Painel de Risco (Early Warning)", "Monitore projetos em risco")}
            <div class="page-content">
                <div style="margin-bottom:20px"><button class="btn-primary" id="gerarRelatorioRiscoBtn">Gerar Relatório de Riscos</button></div>
                <div class="section-card projects-table-wrapper">
                    <table class="data-table"><thead><tr><th>Projeto</th><th>Orientador</th><th>Nível</th><th>Riscos Detectados</th><th>Ações</th></tr></thead>
                    <tbody>${riscoProjetos.map(p=>`<tr><td>${p.nome}</td><td>${p.orientador}</td><td class="${p.risco==='Alto'?'risk-high':'risk-medium'}">${p.risco}</td><td>${p.risco==='Alto'?'18d sem atualizar':'Feedbacks pendentes'}</td><td><button class="btn-sm notificarOri" data-nome="${p.nome}">Notificar Orientador</button></td></tr>`).join('')}</tbody></table>
                </div>
            </div>
        `;
    }

    function attachEvents() {
        // Botões "Ver Detalhes"
        document.querySelectorAll('.ver-detalhes').forEach(btn => {
            btn.onclick = () => {
                const id = parseInt(btn.dataset.id);
                const p = projetosData.find(x => x.id === id);
                showModal(`Projeto: ${p.nome}\nStatus: ${p.status}\nProgresso: ${p.progresso}%\nOrientador: ${p.orientador}\nEquipe: ${p.alunos || "Não informado"}`);
            };
        });
        // Submissão
        const enviar = document.getElementById('enviarVersaoBtn');
        if(enviar) enviar.onclick = () => showModal("Versão enviada com sucesso! Orientador notificado.");
        const cancelar = document.getElementById('cancelarSubmissao');
        if(cancelar) cancelar.onclick = () => showModal("Submissão cancelada.");
        // Avaliação
        const salvar = document.getElementById('salvarAvaliacaoBtn');
        if(salvar) salvar.onclick = () => {
            const m = (parseFloat(document.getElementById('notaMetodologia')?.value||0) + parseFloat(document.getElementById('notaResultados')?.value||0) + parseFloat(document.getElementById('notaOriginalidade')?.value||0) + parseFloat(document.getElementById('notaFormatacao')?.value||0)) / 4;
            showModal(`Avaliação salva! Nota final: ${m.toFixed(1)}. Alunos notificados.`);
        };
        const emailBtn = document.getElementById('enviarEmailBtn');
        if(emailBtn) emailBtn.onclick = () => showModal("E-mail enviado com sucesso.");
        // Painel de Risco
        document.querySelectorAll('.notificarOri').forEach(btn => {
            btn.onclick = () => showModal(`Notificação enviada ao orientador de ${btn.dataset.nome}.`);
        });
        const gerar = document.getElementById('gerarRelatorioRiscoBtn');
        if(gerar) gerar.onclick = () => showModal("Relatório de riscos gerado em PDF (simulado).");
        // Header e sidebar extras
        const bell = document.getElementById('bellIcon');
        if(bell) bell.onclick = () => showModal("Você tem 3 notificações não lidas.");
        const profile = document.getElementById('userProfile');
        if(profile) profile.onclick = () => showModal("Perfil de Ana Paula (Coordenação)");
        const config = document.getElementById('configBtn');
        if(config) config.onclick = () => showModal("Configurações do sistema (em desenvolvimento).");
        const ajuda = document.getElementById('ajudaBtn');
        if(ajuda) ajuda.onclick = () => showModal("Ajuda: Consulte o manual do SENACODEX.");
    }

    function renderDoughnutChart() {
        const canvas = document.getElementById('statusDoughnut');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const emAndamento = projetosData.filter(p=>p.status==="Em Andamento").length;
        const emRevisao = projetosData.filter(p=>p.status==="Em Revisão").length;
        const ativados = 2;
        const concluidos = projetosData.filter(p=>p.status==="Concluído").length;
        if(window.doughnutChartInstance) window.doughnutChartInstance.destroy();
        window.doughnutChartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Em Andamento','Em Revisão','Ativados','Concluídos'], datasets: [{ data: [emAndamento, emRevisao, ativados, concluidos], backgroundColor: ['#0A3D91','#F37021','#e74c3c','#2ecc71'], borderWidth: 0, cutout: '60%' }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
        });
    }

    function loadPage(page) {
        let html = "";
        if(page === "dashboard") html = renderDashboard();
        else if(page === "projetos") html = renderProjetos();
        else if(page === "submeter") html = renderSubmeter();
        else if(page === "analisadores") html = renderAnalisadores();
        else if(page === "relatorios") html = renderRelatorios();
        else if(page === "risco") html = renderRisco();
        document.getElementById("mainContent").innerHTML = html;
        attachEvents();
        if(page === "dashboard") renderDoughnutChart();
        if(page === "relatorios") {
            const ctx = document.getElementById('evolucaoChart')?.getContext('2d');
            if(ctx) new Chart(ctx, { type: 'line', data: { labels: ['Jan','Fev','Mar','Abr','Mai'], datasets: [{ label: 'Projetos Ativos', data: [9,11,12,14,12], borderColor: '#F37021', tension: 0.3, fill: false }] } });
        }
    }

    function init() {
        loadPage('dashboard');
        document.querySelectorAll('.nav-item[data-page]').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                loadPage(item.dataset.page);
            });
        });
    }
    init();
</script>
</body>
</html>
